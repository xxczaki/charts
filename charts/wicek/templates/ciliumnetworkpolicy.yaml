{{- if and .Values.networkPolicy.enabled (eq .Values.networkPolicy.provider "cilium") }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "wicek.fullname" . }}
  labels:
    {{- include "wicek.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "wicek.selectorLabels" . | nindent 6 }}
  # Outbound-only bot: deny all ingress, and deny egress except the rules below.
  enableDefaultDeny:
    ingress: true
    egress: true
  egress:
    # DNS via kube-dns. The L7 DNS rule lets Cilium learn resolved IPs so the
    # toFQDNs rules below can match; queries themselves are unrestricted.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    {{- with .Values.networkPolicy.cilium.allowedFQDNs }}
    # HTTPS to allowlisted domains – everything else is denied.
    - toFQDNs:
        {{- range . }}
        - matchName: {{ . | quote }}
        {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.cilium.allowedCIDRs }}
    # HTTPS to allowlisted CIDRs (e.g. a LAN controller).
    - toCIDR:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}
    {{- if .Values.networkPolicy.tailscale.enabled }}
    # SSH + sidecar service ports to the Tailscale namespace.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.networkPolicy.tailscale.namespace }}
      toPorts:
        - ports:
            {{- range .Values.networkPolicy.tailscale.ports }}
            - port: {{ . | quote }}
              protocol: TCP
            {{- end }}
    {{- end }}
{{- end }}
