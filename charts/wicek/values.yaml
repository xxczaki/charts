secrets:
  # -- Points to a Secret containing the Claude Code OAuth token
  # Generated via `claude setup-token`
  # @section -- Authentication
  oauthToken:
    name: ""
    key: ""
  # -- Points to a Secret containing the Discord bot token
  # @section -- Authentication
  discordToken:
    name: ""
    key: ""
  # -- Points to a Secret containing a GitHub token (GH_TOKEN)
  # Authenticates the `gh` CLI and git pushes. When unset, GH_TOKEN is not injected.
  # @section -- Authentication
  ghToken:
    name: ""
    key: ""
  # -- Points to a Secret containing the Grafana API key
  # @section -- Authentication
  grafanaApiKey:
    name: ""
    key: ""
  # -- Points to a Secret containing the Home Assistant long-lived access token
  # Authenticates to the Home Assistant MCP server. When unset, HA_TOKEN is not injected.
  # @section -- Authentication
  haToken:
    name: ""
    key: ""
  # -- Points to a Secret containing the Apple ID email (iCloud CalDAV)
  # @section -- Authentication
  appleId:
    name: ""
    key: ""
  # -- Points to a Secret containing the Apple app-specific password (iCloud CalDAV)
  # When appleId and appleAppPassword are both set, APPLE_ID/APPLE_APP_PASSWORD are injected.
  # @section -- Authentication
  appleAppPassword:
    name: ""
    key: ""
  # -- Points to a Secret containing the UniFi controller username
  # When unifiUsername and unifiPassword are both set, UNIFI_USERNAME/UNIFI_PASSWORD are injected.
  # @section -- Authentication
  unifiUsername:
    name: ""
    key: ""
  # -- Points to a Secret containing the UniFi controller password
  # @section -- Authentication
  unifiPassword:
    name: ""
    key: ""
  # -- Points to a Secret containing the Home Assistant SSH key
  # @section -- Authentication
  haSSHKey:
    name: ""
    key: ""
env:
  # -- Discord application client ID
  # @section -- Bot
  clientId: ""
  # -- Comma-separated Discord user IDs allowed to interact
  # @section -- Bot
  allowedUserIds: ""
image:
  repository: ghcr.io/xxczaki/wicek
  pullPolicy: Always
  tag: "c500b84ddcf967b964f70287e6ea2e0827109b0c"
serviceAccount:
  create: true
  annotations: {}
  name: ""
persistence:
  # -- Size of the persistent volume for Claude Code state and app data
  # @section -- Storage
  size: "5Gi"
  accessModes:
    - ReadWriteOnce
  storageClass: ""
securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "1Gi"
    cpu: "500m"
initContainers:
  ghCli:
    # -- GitHub CLI version to install
    # @section -- Init Containers
    version: "2.87.3"
chromium:
  # -- Enable headless Chrome sidecar for browser automation
  # @section -- Browser
  enabled: false
  image: chromedp/headless-shell:stable
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
networkPolicy:
  # -- Restrict pod traffic (the bot is outbound-only; ingress is always denied)
  # @section -- Network Policy
  enabled: true
  # -- Policy provider: "standard" (portable, port-based NetworkPolicy) or
  # "cilium" (DNS-aware FQDN egress allowlist with default-deny; requires the
  # Cilium CNI). Use "cilium" to restrict egress to specific domains.
  # @section -- Network Policy
  provider: standard
  tailscale:
    # -- Allow egress to a Tailscale namespace (SSH and sidecar service ports). Applies to both providers.
    # @section -- Network Policy
    enabled: true
    # -- Namespace running the Tailscale operator/egress proxies
    # @section -- Network Policy
    namespace: tailscale
    # -- Ports allowed to Tailscale destinations
    # @section -- Network Policy
    ports:
      - 22
      - 8123
  cilium:
    # -- Domains the agent may reach over HTTPS. Everything else is denied (provider "cilium" only).
    # @section -- Network Policy
    allowedFQDNs: []
    # -- CIDRs the agent may reach over HTTPS, e.g. a LAN controller (provider "cilium" only).
    # @section -- Network Policy
    allowedCIDRs: []
